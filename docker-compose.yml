
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  redis:
    image: redis:6
    restart: always
    logging: *default-logging
    volumes:
      - redis_data:/data
    # Keep Redis persistence under /data (volume-mounted) and avoid relying on an external redis.conf.
    # Use sh so we can reference the container env var for the password.
    # NOTE: docker-compose does variable interpolation on `$...` inside strings.
    # Use `$$` to pass `$REDIS_PASSWORD` through to the container shell so it expands there.
    command: ["sh", "-c", "exec redis-server --dir /data --dbfilename redis_miner --requirepass \"$$REDIS_PASSWORD\""]
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=tinntenRedis123
    mem_limit: 256m
    cpus: 0.25
    networks:
      - tinnten-net

  mongodb:
    image: mongo:7.0
    container_name: tinnten-mongodb
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-keyfile:/opt/mongo-keyfile
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: tinntenMongo123
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/opt/mongo-keyfile"]
    networks:
      - tinnten-net

  tinnten-mongodb-public:
    image: mongo:7.0
    container_name: tinnten-mongodb-public
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:27018:27017"
    volumes:
      - mongo_public_data:/data/db
      - ./mongo-public-keyfile:/opt/mongo-public-keyfile:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: PublicMongoPassword123!
    command: ["mongod", "--replSet", "rsPublic", "--bind_ip_all", "--keyFile", "/opt/mongo-public-keyfile"]
    networks:
      - tinnten-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms4g -Xmx4g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    mem_limit: 12g
    cpus: 6.0
    ports:
      - "127.0.0.1:9200:9200"
    networks:
      - tinnten-net

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=password
    networks:
      - tinnten-net

  clamav:
    image: clamav/clamav:1.4
    container_name: tinnten-clamav
    restart: always
    logging: *default-logging
    volumes:
      - clamav_data:/var/lib/clamav
    mem_limit: 2g
    cpus: 1.0
    networks:
      - tinnten-net

  tinnten-server:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    volumes:
      - ./tinnten-server/token:/app/token
      - conversation_storage:/app/storage/conversation
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:5001:5001"
    restart: always
    logging: *default-logging
    depends_on:
      - redis
      - rabbitmq
      - mongodb
      - elasticsearch
    environment:
      - NODE_ENV=production
      - DISABLE_AUTO_FILE_INTELLIGENCE_WORKER=true
      - DISABLE_AUTO_ERROR_WORKER=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=tinntenRedis123
      - ELASTICSEARCH_BASE_URL=http://elasticsearch:9200
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
      - RABBITMQ_PROTOCOL=amqp
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - FETCHER_URL=http://tinnten-fetcher:5005
      - EMBEDDING_BASE_URL=http://tinnten-embedding:5003
      - PRODUCT_CATALOG_SERVICE_URL=http://product-catalog:5010
      - CRON_SERVICE_URL=http://tinnten-cron:5005
      - CRON_URL=http://tinnten-cron:5005
      - RABBIT_URL=amqp://admin:password@rabbitmq:5672/
      # Workflow Engine — AES-256 şifreleme anahtarı (64 hex char = 32 byte). .env üzerinden set edin.
      # WORKFLOW_ENCRYPTION_KEY=<64-hex-char-key>
    networks:
      - tinnten-net
      - tinnten-ai-net

  tinnten-cron:
    build:
      context: ./tinnten-cron
    env_file:
      - ./tinnten-cron/.env
    ports:
      - "127.0.0.1:5007:5005"
    restart: always
    logging: *default-logging
    depends_on:
      - redis
      - rabbitmq
      - mongodb
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=tinntenRedis123
      - ELASTICSEARCH_BASE_URL=http://elasticsearch:9200
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
      - DB_TINNTEN=tinnten-cron
      - RABBITMQ_PROTOCOL=amqp
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - FETCHER_URL=http://tinnten-fetcher:5005
      - EMBEDDING_BASE_URL=http://tinnten-embedding:5003
      - PRODUCT_CATALOG_SERVICE_URL=http://product-catalog:5010
      - RABBIT_URL=amqp://admin:password@rabbitmq:5672/
      - CRON_WEBHOOK_SECRET=tinnten-cron-secret-2026
    networks:
      - tinnten-net

  tinnten-fetcher:
    build:
      context: ./tinnten-fetcher
    container_name: tinnten-fetcher
    env_file:
      - ./tinnten-fetcher/.env
    ports:
      - "127.0.0.1:5005:5005"
    restart: always
    logging: *default-logging
    depends_on:
      - redis
      - rabbitmq
      - mongodb
    environment:
      - PORT=5005
      - AUTH_ENABLED=true
    volumes:
      - fetcher_raw_pages:/var/data/raw-pages
    mem_limit: 4g
    cpus: 2.0
    networks:
      - tinnten-net

  tinnten-embedding:
    build:
      context: ./tinnten-embedding
    env_file:
      - ./tinnten-embedding/.env
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:5003:5003"
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
      # --- RAG v2 retrieval (tinnten-embedding/docs/RAG_V2_ROADMAP.md) ---
      # Bu blok BUGUN DAVRANIS DEGISTIRMEZ. Amaci, daha once HICBIR deploy
      # artefaktinda gorunmeyen retrieval anahtarlarini acikca ortaya koymak;
      # rollout/rollback tek satir olsun.
      #
      # Kod varsayilanlariyla karsilastirma (runtime'da dogrulandi):
      #   HYBRID_SEARCH_ENABLED / HYBRID_OVERFETCH / RRF_K_CONSTANT /
      #   RERANKER_MODEL / CHUNK_STRATEGY / INGEST_LEASE_SECONDS -> AYNI.
      #   RERANK_TOP_N -> kod varsayilani 30, burada 20. Reranker KAPALI oldugu
      #   surece ATIL (etkisi yok); RERANKER_MODEL doldurulunca devreye girer.
      #   20 = Faz 4'un CPU-bilincli baslangic degeri, p95 olcumune gore ayarla.
      #
      # Hybrid = dense FAISS + lexical Mongo $text, RRF ile birlestirilir.
      # ON KOSUL: `chunk_text_search` index'i GERCEKTEN var olmali. Index
      # olusturma hatasi kodda sessizce yutuluyor ve $text hata vermeden BOS
      # donuyor -> hybrid "acik" gorunur ama tek bacakla calisir, fark edilmez.
      # Acmadan once:  python3 scripts/rag_preflight.py --company-id <ID>
      # Kademeli acilis icin firma-bazli canary (server override) tercih edilir;
      # bu global anahtar TUM firmalari birden etkiler.
      - HYBRID_SEARCH_ENABLED=false
      - HYBRID_OVERFETCH=4
      - RRF_K_CONSTANT=60
      # Reranker: BOS = kapali. Doldurmadan once Faz 4'u oku:
      #  * model ~2GB; Dockerfile onu build'de INDIRMIYOR -> ilk sorguda
      #    runtime'da iner. HF cache `embedding_data` volume'unda DEGIL (orasi
      #    yalniz FAISS) -> her image rebuild'de ~2GB yeniden iner.
      #  * prod CPU-only (torch+cpu) -> p95 latency OLCULMEDEN acma.
      #  * yuklenemezse servis healthy kalir ve arama SESSIZCE rerank'siz doner;
      #    gorunurluk: GET /api/v10/config -> reranker_loaded/reranker_load_error
      - RERANKER_MODEL=
      - RERANK_TOP_N=20
      # Chunking: char | structure | auto. `auto` (Faz 7/KN3) icerige gore secer:
      # markdown basligi VARSA structure, YOKSA char (schema-derived basliksiz
      # metinde structure faydasiz). Degistirmek REINDEX ister.
      - CHUNK_STRATEGY=char
      # Faithful schema reindex (Faz 6): fetcher DB-read yolunda schema-derived
      # metni markdown'dan once kullan (crawl_results.extracted.extracted_content).
      # Varsayilan KAPALI; reindex surucusu bilincli acar. MIN_CHARS fetcher
      # Config.INDEX_SCHEMA_MIN_CHARS (=200) ile AYNI olmali.
      - INDEX_SCHEMA_CONTENT_ENABLED=false
      - INDEX_SCHEMA_MIN_CHARS=200
      # Ingest kilidi lease suresi (sn) — worker olurse kilit devralinabilsin.
      - INGEST_LEASE_SECONDS=900
    volumes:
      # FAISS index files live under /app/data; without a named volume every
      # image rebuild wipes the vectors while chunk metadata stays in Mongo
      # (causes "indexed but search returns 0" — see embedding_architecture.md).
      - embedding_data:/app/data
    mem_limit: 12g
    cpus: 8.0
    depends_on:
      - rabbitmq
      - mongodb
      - elasticsearch
    networks:
      - tinnten-net

  product-catalog:
    build:
      context: ./tinnten-product-catalog
    env_file:
      - ./tinnten-product-catalog/.env
    ports:
      - "127.0.0.1:5010:5010"
    restart: always
    logging: *default-logging
    depends_on:
      - rabbitmq
      - mongodb
    environment:
      - NODE_ENV=production
      - CATALOG_PORT=5010
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
      - CATALOG_DB_NAME=tinnten-product-catalog
      - RABBITMQ_PROTOCOL=amqp
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - REDIS_HOST=redis
      - REDIS_PASSWORD=tinntenRedis123
    networks:
      - tinnten-net

  product-catalog-worker:
    build:
      context: ./tinnten-product-catalog
    env_file:
      - ./tinnten-product-catalog/.env
    command: ["python", "product_catalog_worker.py"]
    restart: always
    logging: *default-logging
    depends_on:
      - rabbitmq
      - mongodb
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
      - CATALOG_DB_NAME=tinnten-product-catalog
      - RABBITMQ_PROTOCOL=amqp
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
    networks:
      - tinnten-net

  analytics-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["npm", "run", "analyticsworker"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
    mem_limit: 1g
    cpus: 0.5
    depends_on:
      - rabbitmq
      - mongodb
    networks:
      - tinnten-net

  email-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["npm", "run", "emailworker"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
    mem_limit: 1g
    cpus: 0.5
    depends_on:
      - rabbitmq
      - mongodb
    networks:
      - tinnten-net

  # Toplu mail kampanya worker'ı — ayrı campaign_email_queue'yu tüketir
  # (büyük blast transactional email-worker'ı bloklamasın). prefetch(1) +
  # kampanya sendConfig.ratePerSec ile throttle eder. SES itibar ayarları
  # (SES_CONFIGURATION_SET, SES_CAMPAIGN_MAX_RATE) .env'den gelir.
  campaign-email-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["npm", "run", "campaignworker"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
    mem_limit: 1g
    cpus: 0.5
    depends_on:
      - rabbitmq
      - mongodb
    networks:
      - tinnten-net

  db-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["npm", "run", "dbworker"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
    mem_limit: 4g
    cpus: 2.0
    depends_on:
      - rabbitmq
      - mongodb
    networks:
      - tinnten-net

  # ─────────────────────────────────────────────────────────────────────────
  # Error Worker (in-house hata izleme — eski Sentry yerine)
  #
  # error_queue'yu tüketir → error_events + error_issues (Mongo). Token'lı
  # hatalarda kullanıcıyı Keycloak'tan çözer (.env admin creds) ve Redis'te
  # cache'ler. tinnten-server DISABLE_AUTO_ERROR_WORKER=true ile auto-spawn
  # kapalı; bu container tek tüketici (file-intelligence-worker ile aynı desen).
  # ─────────────────────────────────────────────────────────────────────────
  error-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["npm", "run", "errorworker"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=tinntenRedis123
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
    mem_limit: 1g
    cpus: 0.5
    depends_on:
      - rabbitmq
      - mongodb
      - redis
    networks:
      - tinnten-net

  productization-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["npm", "run", "productizationworker"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=tinntenRedis123
      - REDIS_URL=redis://:tinntenRedis123@redis:6379
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
      - FETCHER_URL=http://tinnten-fetcher:5005
      - PRODUCTIZATION_FETCHER_CLAIM_ENABLED=true
      - PRODUCTIZATION_CRAWL_LIMIT=0
      - PRODUCTIZATION_FETCHER_CLAIM_PAGE_SIZE=50
      - PRODUCTIZATION_FETCHER_HTTP_TIMEOUT=180000
    mem_limit: 6g
    cpus: 1.0
    depends_on:
      - rabbitmq
      - mongodb
      - tinnten-fetcher
    networks:
      - tinnten-net
      - tinnten-ai-net

  # ─────────────────────────────────────────────────────────────────────────
  # User Product Categorization Worker
  #
  # Wizard / panel'den eklenen kullanıcı ürün ve hizmetleri için Ollama
  # üzerinden 4-seviyeli kategori tahmini yapar, mevcut DB'de findOrCreate
  # ile aiCategories alanını doldurur.
  #
  # ÖNEMLI: tinnten-productization-worker'la KARIŞTIRMA — o kazıma
  # ürünleri (scrap pipeline) için. Bu ayrı bir akış, kullanıcı tarafı.
  #
  # Plan kaynağı: ~/.claude/plans/wizard-company-categorization/INDEX.md
  # ─────────────────────────────────────────────────────────────────────────
  user-product-categorization-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["npm", "run", "userproductcategorizationworker"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
      # Ollama config — qwen2.5:7b prod'da yüklü
      - OLLAMA_URL=http://tinnten-ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - OLLAMA_DISABLED=false
      # Worker tuning
      - USER_PRODUCT_CATEGORIZATION_PREFETCH=1
    mem_limit: 1g
    cpus: 0.5
    depends_on:
      - rabbitmq
      - mongodb
      - ollama
    networks:
      - tinnten-net
      - tinnten-ai-net

  search-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["sh", "-c", "until curl -s http://elasticsearch:9200 >/dev/null; do sleep 3; done; npm run searchworker"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
    mem_limit: 2g
    cpus: 1.0
    depends_on:
      - rabbitmq
      - mongodb
      - elasticsearch
    networks:
      - tinnten-net

  wallet-log-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["node", "src/workers/walletLogWorker.js"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
    mem_limit: 1g
    cpus: 0.5
    depends_on:
      - rabbitmq
    networks:
      - tinnten-net

  file-intelligence-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["node", "src/workers/fileIntelligenceWorker.js"]
    restart: always
    logging: *default-logging
    volumes:
      - conversation_storage:/app/storage/conversation
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
      - CLAMD_HOST=clamav
      - CLAMD_PORT=3310
      - CLAMAV_ENABLED=true
    mem_limit: 2g
    cpus: 1.0
    depends_on:
      - rabbitmq
      - mongodb
      - clamav
    networks:
      - tinnten-net

  company-information-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["node", "src/workers/companyInformationWorker.js"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
      - FETCHER_URL=http://tinnten-fetcher:5005
      - EMBEDDING_BASE_URL=http://tinnten-embedding:5003
    mem_limit: 1g
    cpus: 0.5
    depends_on:
      - rabbitmq
      - mongodb
    networks:
      - tinnten-net


  subscription-worker:
    build:
      context: ./tinnten-server
    env_file:
      - ./tinnten-server/.env
    command: ["npm", "run", "subscriptionworker"]
    restart: always
    logging: *default-logging
    environment:
      - NODE_ENV=production
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=password
      - RABBITMQ_VHOST=/
      - RABBITMQ_AUTH_MECHANISM=PLAIN,AMQPLAIN,EXTERNAL
      - MONGO_URI=mongodb://root:tinntenMongo123@mongodb:27017/tinnten?authSource=admin
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      - rabbitmq
      - mongodb
    networks:
      - tinnten-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    restart: always
    logging: *default-logging
    privileged: true
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - tinnten-net

  node-exporter:
    image: prom/node-exporter:v1.8.1
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host"
    networks:
      - tinnten-net
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - cadvisor
      - node-exporter
    networks:
      - tinnten-net

  grafana:
    image: grafana/grafana:11.1.0
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ChangeMe123!
      - GF_USERS_DEFAULT_THEME=light
      # CMS içine iframe ile gömme için gerekli (Sistem İzleme > Grafana sekmesi)
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # CMS, Grafana'yı kimlik-korumalı reverse proxy arkasından gösterir; gerekirse:
      # - GF_SECURITY_COOKIE_SAMESITE=none
      # - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      # - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - tinnten-net

  ollama:
    image: ollama/ollama:latest
    container_name: tinnten-ollama
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=3
    mem_limit: 14g
    cpus: 18.0
    networks:
      - tinnten-net
      - tinnten-ai-net

  portainer:
    image: portainer/portainer-ce:2.20.3
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - tinnten-net


volumes:
  redis_data:
  mongo_data:
  mongo_public_data:
  esdata:
  prometheus_data:
  grafana_data:
  portainer_data:
  ollama_data:
  clamav_data:
  embedding_data:
    # FAISS index persistence for tinnten-embedding. Stores /app/data/faiss/
    # (faiss.index + sidecars). Mongo holds chunk metadata; this volume holds
    # the actual vectors. Both must survive across image rebuilds.
  conversation_storage:
    # Fixed host path for conversation attachment staging.
    # Size is managed at the host filesystem level; reserve at least 50 GB on /srv.
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/tinnten/conversation-storage
  fetcher_raw_pages:
    # Fixed host path for fetcher disk-storage mode (raw scraped pages).
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/tinnten/fetcher-raw-pages

networks:
  tinnten-net:
    driver: bridge
  tinnten-ai-net:
    driver: bridge
    internal: true
